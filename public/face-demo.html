<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Verifikasi Wajah</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: #000;
      min-height: 100vh;
      color: white;
      overflow: hidden;
      position: relative;
    }
    
    /* Animated gradient background */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      z-index: 0;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      max-width: 420px;
      margin: 0 auto;
    }
    
    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
      transition: opacity 0.5s;
    }
    .header.hidden { opacity: 0; pointer-events: none; }
    
    .logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
    }
    
    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    
    .subtitle {
      font-size: 14px;
      opacity: 0.5;
      font-weight: 400;
    }
    
    /* Camera Frame - Apple FaceID style */
    .camera-frame {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 0 auto;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }
    .camera-frame.show { opacity: 1; pointer-events: all; }
    
    .camera-frame video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      transform: scaleX(-1);
    }
    
    /* Pulsing ring */
    .pulse-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      transition: all 0.3s;
    }
    .pulse-ring.scanning {
      border-color: rgba(102, 126, 234, 0.6);
      animation: pulseRing 2s infinite;
    }
    .pulse-ring.success {
      border-color: #10b981;
      border-width: 3px;
      box-shadow: 0 0 40px rgba(16, 185, 129, 0.5);
    }
    .pulse-ring.error {
      border-color: #ef4444;
    }
    @keyframes pulseRing {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.15); opacity: 0; }
    }
    
    /* Face guide overlay */
    .face-guide {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140px;
      height: 180px;
      border: 2px dashed rgba(255,255,255,0.25);
      border-radius: 50% 50% 45% 45%;
      pointer-events: none;
      transition: all 0.3s;
    }
    .face-guide.hidden { opacity: 0; }
    
    /* Status text - minimalis */
    .status-text {
      text-align: center;
      margin-top: 32px;
      font-size: 15px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
      min-height: 20px;
      letter-spacing: 0.3px;
    }
    .status-text.show { opacity: 0.9; }
    .status-text.success { opacity: 1; color: #6ee7b7; font-weight: 600; }
    .status-text.error { opacity: 1; color: #fca5a5; }
    
    /* Loading spinner */
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Primary button */
    .btn-start {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 16px 48px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
      letter-spacing: 0.5px;
    }
    .btn-start:active { transform: scale(0.96); }
    .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }
    
    /* Capture button - minimal */
    .btn-capture {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 14px 32px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
    }
    .btn-capture:active { transform: scale(0.96); }
    .btn-capture:disabled { opacity: 0.3; cursor: not-allowed; }
    
    /* Result overlay */
    .result-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.4s;
    }
    .result-overlay.show { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .result-content {
      text-align: center;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes scaleIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .result-icon-big {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 12px 40px rgba(16, 185, 129, 0.4);
    }
    
    .result-title-big {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .result-subtitle {
      font-size: 14px;
      opacity: 0.5;
      margin-bottom: 28px;
    }
    
    .result-details {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 32px;
      font-size: 13px;
    }
    .result-detail-item {
      text-align: center;
    }
    .result-detail-value {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 2px;
    }
    .result-detail-label {
      opacity: 0.4;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .btn-done {
      background: white;
      color: black;
      border: none;
      padding: 14px 40px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-done:active { transform: scale(0.96); }
    
    /* Hidden video element */
    #hiddenVideo {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  
  <div class="container">
    <div class="header" id="header">
      <div class="logo">🔐</div>
      <h1>Verifikasi Wajah</h1>
      <p class="subtitle">Tingkatkan keamanan akun Anda</p>
    </div>
    
    <div class="camera-frame" id="cameraFrame">
      <video id="video" autoplay playsinline muted></video>
      <div class="pulse-ring" id="pulseRing"></div>
      <div class="face-guide" id="faceGuide"></div>
    </div>
    
    <div class="status-text" id="statusText"></div>
    
    <button class="btn-start" id="startBtn" disabled>
      <span id="startBtnText">Memuat...</span>
    </button>
    
    <button class="btn-capture" id="captureBtn" style="display:none;" disabled>
      Ambil Foto
    </button>
  </div>
  
  <!-- Result overlay -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-content">
      <div class="result-icon-big">✓</div>
      <div class="result-title-big">Verifikasi Berhasil</div>
      <div class="result-subtitle" id="resultSubtitle">Identitas terkonfirmasi</div>
      <div class="result-details">
        <div class="result-detail-item">
          <div class="result-detail-value" id="confidenceValue">-</div>
          <div class="result-detail-label">Akurasi</div>
        </div>
        <div class="result-detail-item">
          <div class="result-detail-value" id="timeValue">-</div>
          <div class="result-detail-label">Waktu</div>
        </div>
      </div>
      <button class="btn-done" onclick="resetAll()">Selesai</button>
    </div>
  </div>
  
  <video id="hiddenVideo" autoplay playsinline muted></video>

  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  
  <script>
    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
    const video = document.getElementById('video');
    const hiddenVideo = document.getElementById('hiddenVideo');
    const header = document.getElementById('header');
    const cameraFrame = document.getElementById('cameraFrame');
    const pulseRing = document.getElementById('pulseRing');
    const faceGuide = document.getElementById('faceGuide');
    const statusText = document.getElementById('statusText');
    const startBtn = document.getElementById('startBtn');
    const startBtnText = document.getElementById('startBtnText');
    const captureBtn = document.getElementById('captureBtn');
    const resultOverlay = document.getElementById('resultOverlay');
    
    let stream = null;
    let isVerifying = false;
    let isFaceValid = false;
    let startTime = 0;
    let detectionTimer = null;
    let blinkCount = 0;
    let isEyeClosed = false;
    let lastBlinkTime = 0;
    let blinkStartTime = 0;
    
    // Adaptive threshold variables
    let earSamples = [];
    let earBaseline = null;
    let earMin = 1.0;
    let calibrationDone = false;
    const CALIBRATION_FRAMES = 20;
    
    function calculateEAR(eye) {
      const A = Math.sqrt(Math.pow(eye[1].x - eye[5].x, 2) + Math.pow(eye[1].y - eye[5].y, 2));
      const B = Math.sqrt(Math.pow(eye[2].x - eye[4].x, 2) + Math.pow(eye[2].y - eye[4].y, 2));
      const C = Math.sqrt(Math.pow(eye[0].x - eye[3].x, 2) + Math.pow(eye[0].y - eye[3].y, 2));
      return (A + B) / (2 * C);
    }
    
    function showStatus(text, type = '') {
      statusText.className = 'status-text show ' + type;
      statusText.textContent = text;
    }
    
    function hideStatus() {
      statusText.className = 'status-text';
    }
    
    async function loadModels() {
      try {
        startBtnText.textContent = 'Memuat...';
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
        ]);
        startBtnText.textContent = 'Mulai Verifikasi';
        startBtn.disabled = false;
      } catch (err) {
        startBtnText.textContent = 'Gagal Memuat';
      }
    }
    
    async function startCamera() {
      try {
        startBtn.style.display = 'none';
        header.classList.add('hidden');
        showStatus('Mengaktifkan kamera...');
        
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 640 } },
          audio: false
        });
        video.srcObject = stream;
        
        await new Promise(resolve => video.onloadedmetadata = resolve);
        
        cameraFrame.classList.add('show');
        pulseRing.className = 'pulse-ring scanning';
        
        isVerifying = true;
        startTime = performance.now();
        blinkCount = 0;
        calibrationDone = false;
        earSamples = [];
        earBaseline = null;
        earMin = 1.0;
        
        showStatus('Posisikan wajah di lingkaran');
        detectionLoop();
      } catch (err) {
        showStatus('Gagal mengakses kamera', 'error');
        startBtn.style.display = 'block';
        header.classList.remove('hidden');
      }
    }
    
    async function detectionLoop() {
      if (!isVerifying) return;
      
      try {
        const detection = await faceapi
          .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ 
            inputSize: 320, 
            scoreThreshold: 0.5 
          }))
          .withFaceLandmarks();
        
        if (!detection) {
          isFaceValid = false;
          captureBtn.disabled = true;
          faceGuide.classList.remove('hidden');
          pulseRing.className = 'pulse-ring scanning';
          if (calibrationDone) showStatus('Wajah tidak terdeteksi');
          if (isVerifying) detectionTimer = setTimeout(detectionLoop, 80);
          return;
        }
        
        // Validate face position
        const box = detection.detection.box;
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        
        const isCentered = 
          Math.abs((box.x + box.width/2) - vw/2) < vw * 0.2 &&
          Math.abs((box.y + box.height/2) - vh/2) < vh * 0.2;
        const isBigEnough = box.width > vw * 0.35;
        const notCropped = box.x > 5 && box.y > 5 && box.x + box.width < vw - 5 && box.y + box.height < vh - 5;
        
        if (!isCentered || !isBigEnough || !notCropped) {
          isFaceValid = false;
          captureBtn.disabled = true;
          faceGuide.classList.remove('hidden');
          pulseRing.className = 'pulse-ring scanning';
          
          if (calibrationDone) {
            if (!isCentered) showStatus('Posisikan wajah di tengah');
            else if (!isBigEnough) showStatus('Mendekatlah ke kamera');
            else showStatus('Mundur sedikit');
          }
          if (isVerifying) detectionTimer = setTimeout(detectionLoop, 80);
          return;
        }
        
        // Face valid
        isFaceValid = true;
        captureBtn.disabled = false;
        captureBtn.style.display = 'block';
        faceGuide.classList.add('hidden');
        pulseRing.className = 'pulse-ring scanning';
        
        // === ADAPTIVE BLINK DETECTION ===
        const landmarks = detection.landmarks;
        const leftEye = landmarks.getLeftEye();
        const rightEye = landmarks.getRightEye();
        const leftEAR = calculateEAR(leftEye);
        const rightEAR = calculateEAR(rightEye);
        const avgEAR = (leftEAR + rightEAR) / 2;
        
        // Track minimum EAR
        if (avgEAR < earMin) earMin = avgEAR;
        
        // Calibration phase
        if (!calibrationDone) {
          earSamples.push(avgEAR);
          if (earSamples.length >= CALIBRATION_FRAMES) {
            // Baseline = average of samples (excluding outliers)
            const sorted = [...earSamples].sort((a, b) => a - b);
            const trimmed = sorted.slice(3, -3);
            earBaseline = trimmed.reduce((a, b) => a + b, 0) / trimmed.length;
            calibrationDone = true;
            showStatus('Kedipkan mata Anda');
          } else {
            showStatus('Menyiapkan...');
            if (isVerifying) detectionTimer = setTimeout(detectionLoop, 60);
            return;
          }
        }
        
        // Adaptive threshold: 80% of baseline (20% drop = blink)
        const EAR_THRESHOLD = earBaseline * 0.80;
        const now = performance.now();
        
        if (avgEAR < EAR_THRESHOLD) {
          if (!isEyeClosed) {
            isEyeClosed = true;
            blinkStartTime = now;
          }
        } else {
          if (isEyeClosed) {
            const blinkDuration = now - blinkStartTime;
            isEyeClosed = false;
            
            if (blinkDuration >= 30 && blinkDuration <= 3000 && (now - lastBlinkTime) > 200) {
              blinkCount++;
              lastBlinkTime = now;
              
              await verificationSuccess(detection, 'Blink');
              return;
            }
          }
        }
        
        if (isVerifying) detectionTimer = setTimeout(detectionLoop, 50);
      } catch (err) {
        if (isVerifying) detectionTimer = setTimeout(detectionLoop, 100);
      }
    }
    
    captureBtn.addEventListener('click', async () => {
      if (!isVerifying || !isFaceValid) return;
      
      captureBtn.disabled = true;
      captureBtn.textContent = 'Memproses...';
      
      try {
        const detection = await faceapi
          .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.5 }))
          .withFaceLandmarks();
        
        if (detection) {
          await verificationSuccess(detection, 'Manual');
        } else {
          captureBtn.disabled = false;
          captureBtn.textContent = 'Ambil Foto';
        }
      } catch (err) {
        captureBtn.disabled = false;
        captureBtn.textContent = 'Ambil Foto';
      }
    });
    
    async function verificationSuccess(detection, method) {
      isVerifying = false;
      clearTimeout(detectionTimer);
      
      const totalTime = ((performance.now() - startTime) / 1000).toFixed(1);
      const confidence = (detection.detection.score * 100).toFixed(0);
      
      pulseRing.className = 'pulse-ring success';
      captureBtn.style.display = 'none';
      hideStatus();
      
      setTimeout(() => {
        document.getElementById('confidenceValue').textContent = confidence + '%';
        document.getElementById('timeValue').textContent = totalTime + 's';
        document.getElementById('resultSubtitle').textContent = 
          method === 'Blink' ? 'Kedipan mata terdeteksi' : 'Foto terverifikasi';
        resultOverlay.classList.add('show');
      }, 800);
      
      if (stream) {
        setTimeout(() => stream.getTracks().forEach(t => t.stop()), 1000);
      }
    }
    
    function resetAll() {
      resultOverlay.classList.remove('show');
      cameraFrame.classList.remove('show');
      pulseRing.className = 'pulse-ring';
      hideStatus();
      captureBtn.style.display = 'none';
      captureBtn.textContent = 'Ambil Foto';
      startBtn.style.display = 'block';
      header.classList.remove('hidden');
      isVerifying = false;
      isFaceValid = false;
      calibrationDone = false;
      blinkCount = 0;
    }
    
    startBtn.addEventListener('click', startCamera);
    loadModels();
  </script>
</body>
</html>

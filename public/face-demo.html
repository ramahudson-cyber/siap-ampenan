<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Verifikasi Wajah</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #000; color: white;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .bg-gradient {
      position: fixed; inset: 0;
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
      background-size: 400% 400%; animation: gradientShift 15s ease infinite; z-index: 0;
    }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .container {
      position: relative; z-index: 1; height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; padding-bottom: max(120px, env(safe-area-inset-bottom));
      max-width: 420px; margin: 0 auto;
    }
    .header { text-align: center; margin-bottom: 32px; transition: opacity 0.5s; }
    .header.hidden { opacity: 0; pointer-events: none; position: absolute; }
    .logo { width: 56px; height: 56px; margin: 0 auto 16px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3); }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; opacity: 0.5; }
    .camera-frame { position: relative; width: 220px; height: 220px; margin: 0 auto; opacity: 0; transition: opacity 0.5s; }
    .camera-frame.show { opacity: 1; }
    .camera-frame video { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; transform: scaleX(-1); }
    .pulse-ring { position: absolute; inset: -6px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); transition: all 0.3s; }
    .pulse-ring.scanning { border-color: rgba(102, 126, 234, 0.6); animation: pulseRing 2s infinite; }
    .pulse-ring.success { border-color: #10b981; border-width: 3px; box-shadow: 0 0 40px rgba(16, 185, 129, 0.5); }
    .pulse-ring.blink { border-color: #f59e0b; border-width: 4px; }
    @keyframes pulseRing { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }
    .status-text { text-align: center; margin-top: 24px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s; min-height: 20px; }
    .status-text.show { opacity: 0.9; }
    .status-text.success { opacity: 1; color: #6ee7b7; font-weight: 600; }
    .status-text.blink-hint { opacity: 1; color: #fcd34d; font-weight: 600; font-size: 16px; animation: pulseText 1.2s infinite; }
    @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .btn-container { position: absolute; bottom: max(40px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: 100%; max-width: 360px; padding: 0 24px; z-index: 10; }
    .btn-start { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 16px 48px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3); width: 100%; }
    .btn-start:active { transform: scale(0.96); }
    .btn-start:disabled { opacity: 0.4; }
    .btn-capture { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.15); padding: 14px 32px; border-radius: 24px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; }
    .btn-capture:disabled { opacity: 0.3; }
    .result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 24px; }
    .result-overlay.show { display: flex; }
    .result-content { text-align: center; max-width: 320px; animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .result-icon-big { width: 72px; height: 72px; margin: 0 auto 16px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; box-shadow: 0 12px 40px rgba(16, 185, 129, 0.4); }
    .result-title-big { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .result-subtitle { font-size: 13px; opacity: 0.5; margin-bottom: 24px; }
    .result-details { display: flex; gap: 20px; justify-content: center; margin-bottom: 28px; }
    .result-detail-value { font-weight: 700; font-size: 16px; }
    .result-detail-label { opacity: 0.4; font-size: 10px; text-transform: uppercase; }
    .btn-done { background: white; color: black; border: none; padding: 14px 40px; border-radius: 24px; font-size: 15px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="container">
    <div class="header" id="header">
      <div class="logo">🔐</div>
      <h1>Verifikasi Wajah</h1>
      <p class="subtitle">Powered by Google MediaPipe</p>
    </div>
    <div class="camera-frame" id="cameraFrame">
      <video id="video" autoplay playsinline muted></video>
      <div class="pulse-ring" id="pulseRing"></div>
    </div>
    <div class="status-text" id="statusText"></div>
  </div>
  <div class="btn-container">
    <button class="btn-start" id="startBtn" disabled>Memuat Model AI...</button>
    <button class="btn-capture" id="captureBtn" style="display:none;" disabled>Ambil Foto</button>
  </div>
  <div class="result-overlay" id="resultOverlay">
    <div class="result-content">
      <div class="result-icon-big">✓</div>
      <div class="result-title-big">Verifikasi Berhasil</div>
      <div class="result-subtitle" id="resultSubtitle">Identitas terkonfirmasi</div>
      <div class="result-details">
        <div><div class="result-detail-value" id="confidenceValue">-</div><div class="result-detail-label">Akurasi</div></div>
        <div><div class="result-detail-value" id="timeValue">-</div><div class="result-detail-label">Waktu</div></div>
      </div>
      <button class="btn-done" onclick="resetAll()">Selesai</button>
    </div>
  </div>

  <!-- MediaPipe Face Mesh -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  
  <script>
    const video = document.getElementById('video');
    const cameraFrame = document.getElementById('cameraFrame');
    const pulseRing = document.getElementById('pulseRing');
    const statusText = document.getElementById('statusText');
    const startBtn = document.getElementById('startBtn');
    const captureBtn = document.getElementById('captureBtn');
    const resultOverlay = document.getElementById('resultOverlay');
    const header = document.getElementById('header');
    
    let faceMesh = null;
    let camera = null;
    let isVerifying = false;
    let startTime = 0;
    let blinkCount = 0;
    let isEyeClosed = false;
    let lastBlinkTime = 0;
    let blinkStartTime = 0;
    let earHistory = [];
    let earBaseline = null;
    let calibrationDone = false;
    let consecutiveClosedFrames = 0;
    let lastValidTime = 0;

    // MediaPipe landmark indices untuk mata (468 model)
    const LEFT_EYE = [33, 160, 158, 133, 153, 144];
    const RIGHT_EYE = [362, 385, 387, 263, 373, 380];

    function showStatus(text, type = '') {
      statusText.className = 'status-text show ' + type;
      statusText.textContent = text;
    }

    function calculateEAR(landmarks, eyeIndices) {
      const p1 = landmarks[eyeIndices[0]];
      const p2 = landmarks[eyeIndices[1]];
      const p3 = landmarks[eyeIndices[2]];
      const p4 = landmarks[eyeIndices[3]];
      const p5 = landmarks[eyeIndices[4]];
      const p6 = landmarks[eyeIndices[5]];

      const v1 = Math.sqrt(Math.pow(p2.x - p6.x, 2) + Math.pow(p2.y - p6.y, 2));
      const v2 = Math.sqrt(Math.pow(p3.x - p5.x, 2) + Math.pow(p3.y - p5.y, 2));
      const h = Math.sqrt(Math.pow(p1.x - p4.x, 2) + Math.pow(p1.y - p4.y, 2));

      return (v1 + v2) / (2.0 * h);
    }

    // Load model di awal (preload), bukan saat tombol diklik
    async function loadModels() {
      try {
        faceMesh = new FaceMesh({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });
        
        faceMesh.setOptions({
          maxNumFaces: 1,
          refineLandmarks: true,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });

        faceMesh.onResults(onResults);
        
        // Model siap, aktifkan tombol
        startBtn.textContent = 'Mulai Verifikasi';
        startBtn.disabled = false;
      } catch (err) {
        startBtn.textContent = 'Gagal Memuat Model';
      }
    }

    async function startCamera() {
      try {
        startBtn.style.display = 'none';
        header.classList.add('hidden');
        showStatus('Mengaktifkan kamera...');

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        });
        video.srcObject = stream;

        await new Promise(resolve => video.onloadeddata = resolve);
        video.play();

        cameraFrame.classList.add('show');
        pulseRing.className = 'pulse-ring scanning';

        isVerifying = true;
        startTime = performance.now();
        blinkCount = 0;
        calibrationDone = false;
        earHistory = [];
        earBaseline = null;

        // Gunakan Camera Utils MediaPipe untuk frame management optimal
        camera = new Camera(video, {
          onFrame: async () => {
            if (isVerifying) {
              await faceMesh.send({ image: video });
            }
          },
          width: 640,
          height: 480
        });
        camera.start();

        showStatus('Posisikan wajah full di lingkaran');
      } catch (err) {
        showStatus('Gagal mengakses kamera');
        startBtn.style.display = 'block';
        header.classList.remove('hidden');
      }
    }

    function onResults(results) {
      if (!isVerifying) return;

      const now = performance.now();

      if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
        // Sticky detection: gunakan data terakhir jika < 500ms
        if (now - lastValidTime > 500) {
          captureBtn.disabled = true;
          if (calibrationDone) showStatus('Wajah tidak terdeteksi');
        }
        return;
      }

      // Wajah terdeteksi
      lastValidTime = now;
      captureBtn.disabled = false;
      captureBtn.style.display = 'block';

      const landmarks = results.multiFaceLandmarks[0];
      
      // === VALIDASI POSISI WAJAH FULL FRAME ===
      // Ambil bounding box wajah dari landmark pertama (0) dan terakhir (467)
      // MediaPipe mengembalikan koordinat normalisasi (0.0 - 1.0)
      let minX = 1, maxX = 0, minY = 1, maxY = 0;
      // Kita cek landmark kontur wajah (beberapa titik tepi)
      const faceOval = [10, 152, 234, 454, 127, 356]; // Dahi, dagu, pipi kiri, pipi kanan
      for (let i of faceOval) {
        const pt = landmarks[i];
        if (pt.x < minX) minX = pt.x;
        if (pt.x > maxX) maxX = pt.x;
        if (pt.y < minY) minY = pt.y;
        if (pt.y > maxY) maxY = pt.y;
      }
      
      // Cek apakah wajah terpotong (terlalu mepet tepi)
      const margin = 0.05; // 5% margin dari tepi layar
      const isCropped = minX < margin || maxX > (1 - margin) || minY < margin || maxY > (1 - margin);
      
      // Cek apakah wajah cukup besar (minimal 40% lebar layar)
      const faceWidth = maxX - minX;
      const isTooSmall = faceWidth < 0.40;
      
      if (isCropped || isTooSmall) {
        captureBtn.disabled = true;
        if (calibrationDone) {
          if (isTooSmall) showStatus('Mendekatlah ke kamera');
          else showStatus('Wajah terpotong, mundur sedikit');
        }
        return; // Stop di sini, jangan proses blink
      }
      
      // Wajah valid
      captureBtn.disabled = false;
      captureBtn.style.display = 'block';
      
      // Hitung EAR dari 468 landmarks
      const leftEAR = calculateEAR(landmarks, LEFT_EYE);
      const rightEAR = calculateEAR(landmarks, RIGHT_EYE);
      const avgEAR = (leftEAR + rightEAR) / 2;

      // Kalibrasi (15 frame)
      if (!calibrationDone) {
        earHistory.push(avgEAR);
        if (earHistory.length >= 15) {
          const sorted = [...earHistory].sort((a, b) => a - b);
          const trimmed = sorted.slice(2, -2);
          earBaseline = trimmed.reduce((a, b) => a + b, 0) / trimmed.length;
          calibrationDone = true;
          showStatus('Kedipkan mata Anda', 'blink-hint');
        } else {
          showStatus('Menyiapkan...');
          return;
        }
      }

      // Threshold adaptif 75% baseline (sensitif)
      const EAR_THRESHOLD = earBaseline * 0.75;

      if (avgEAR < EAR_THRESHOLD) {
        consecutiveClosedFrames++;
        if (!isEyeClosed && consecutiveClosedFrames >= 1) {
          isEyeClosed = true;
          blinkStartTime = now;
          pulseRing.className = 'pulse-ring blink';
        }
      } else {
        if (isEyeClosed) {
          const blinkDuration = now - blinkStartTime;
          isEyeClosed = false;
          consecutiveClosedFrames = 0;
          pulseRing.className = 'pulse-ring scanning';

          // Valid blink: 20ms - 3000ms, anti-double 150ms
          if (blinkDuration >= 20 && blinkDuration <= 3000 && (now - lastBlinkTime) > 150) {
            blinkCount++;
            lastBlinkTime = now;
            verificationSuccess(blinkCount, 'Blink');
          }
        }
      }
    }

    captureBtn.addEventListener('click', () => {
      if (!isVerifying || captureBtn.disabled) return;
      verificationSuccess(1, 'Manual');
    });

    function verificationSuccess(count, method) {
      isVerifying = false;
      if (camera) camera.stop();

      const totalTime = ((performance.now() - startTime) / 1000).toFixed(1);
      const confidence = '95';

      pulseRing.className = 'pulse-ring success';
      captureBtn.style.display = 'none';

      setTimeout(() => {
        document.getElementById('confidenceValue').textContent = confidence + '%';
        document.getElementById('timeValue').textContent = totalTime + 's';
        document.getElementById('resultSubtitle').textContent =
          method === 'Blink' ? 'Kedipan mata terdeteksi ✓' : 'Foto terverifikasi';
        resultOverlay.classList.add('show');
      }, 800);
    }

    function resetAll() {
      resultOverlay.classList.remove('show');
      cameraFrame.classList.remove('show');
      pulseRing.className = 'pulse-ring';
      captureBtn.style.display = 'none';
      startBtn.style.display = 'block';
      header.classList.remove('hidden');
      isVerifying = false;
      calibrationDone = false;
      blinkCount = 0;
    }

    startBtn.addEventListener('click', startCamera);
    
    // Preload model saat halaman dibuka
    loadModels();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Verifikasi Wajah</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: #000;
      color: white;
      position: relative;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      z-index: 0;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 24px;
      padding-bottom: max(120px, env(safe-area-inset-bottom));
      max-width: 420px;
      margin: 0 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    .header {
      text-align: center;
      margin-bottom: 32px;
      transition: opacity 0.5s;
      flex-shrink: 0;
    }
    .header.hidden { opacity: 0; pointer-events: none; position: absolute; }
    
    .logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
    }
    
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    
    .subtitle {
      font-size: 13px;
      opacity: 0.5;
      font-weight: 400;
    }
    
    .camera-frame {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
      flex-shrink: 0;
    }
    .camera-frame.show { opacity: 1; pointer-events: all; }
    
    .camera-frame video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      transform: scaleX(-1);
    }
    
    .pulse-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      transition: all 0.3s;
    }
    .pulse-ring.scanning {
      border-color: rgba(102, 126, 234, 0.6);
      animation: pulseRing 2s infinite;
    }
    .pulse-ring.success {
      border-color: #10b981;
      border-width: 3px;
      box-shadow: 0 0 40px rgba(16, 185, 129, 0.5);
    }
    .pulse-ring.error {
      border-color: #ef4444;
    }
    .pulse-ring.blink-detected {
      border-color: #f59e0b;
      border-width: 4px;
    }
    @keyframes pulseRing {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.2); opacity: 0; }
    }
    
    .face-guide {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 160px;
      border: 2px dashed rgba(255,255,255,0.25);
      border-radius: 50% 50% 45% 45%;
      pointer-events: none;
      transition: all 0.3s;
    }
    .face-guide.hidden { opacity: 0; }
    
    .status-text {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
      min-height: 20px;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }
    .status-text.show { opacity: 0.9; }
    .status-text.success { opacity: 1; color: #6ee7b7; font-weight: 600; }
    .status-text.error { opacity: 1; color: #fca5a5; }
    .status-text.blink-hint { 
      opacity: 1; 
      color: #fcd34d; 
      font-weight: 600;
      font-size: 16px;
      animation: pulseText 1.2s infinite;
    }
    @keyframes pulseText {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .btn-container {
      position: absolute;
      bottom: max(40px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 360px;
      padding: 0 24px;
      z-index: 10;
    }
    
    .btn-start {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 16px 48px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
      letter-spacing: 0.5px;
      width: 100%;
    }
    .btn-start:active { transform: scale(0.96); }
    .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }
    
    .btn-capture {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 14px 32px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }
    .btn-capture:active { transform: scale(0.96); }
    .btn-capture:disabled { opacity: 0.3; cursor: not-allowed; }
    
    .result-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.4s;
      padding: 24px;
    }
    .result-overlay.show { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .result-content {
      text-align: center;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 320px;
    }
    @keyframes scaleIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .result-icon-big {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 12px 40px rgba(16, 185, 129, 0.4);
    }
    
    .result-title-big {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    
    .result-subtitle {
      font-size: 13px;
      opacity: 0.5;
      margin-bottom: 24px;
    }
    
    .result-details {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 28px;
      font-size: 13px;
    }
    .result-detail-item { text-align: center; }
    .result-detail-value {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 2px;
    }
    .result-detail-label {
      opacity: 0.4;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .btn-done {
      background: white;
      color: black;
      border: none;
      padding: 14px 40px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-done:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  
  <div class="container">
    <div class="header" id="header">
      <div class="logo">🔐</div>
      <h1>Verifikasi Wajah</h1>
      <p class="subtitle">Tingkatkan keamanan akun Anda</p>
    </div>
    
    <div class="camera-frame" id="cameraFrame">
      <video id="video" autoplay playsinline muted></video>
      <div class="pulse-ring" id="pulseRing"></div>
      <div class="face-guide" id="faceGuide"></div>
    </div>
    
    <div class="status-text" id="statusText"></div>
  </div>
  
  <div class="btn-container">
    <button class="btn-start" id="startBtn" disabled>
      <span id="startBtnText">Memuat...</span>
    </button>
    <button class="btn-capture" id="captureBtn" style="display:none;" disabled>
      Ambil Foto
    </button>
  </div>
  
  <div class="result-overlay" id="resultOverlay">
    <div class="result-content">
      <div class="result-icon-big">✓</div>
      <div class="result-title-big">Verifikasi Berhasil</div>
      <div class="result-subtitle" id="resultSubtitle">Identitas terkonfirmasi</div>
      <div class="result-details">
        <div class="result-detail-item">
          <div class="result-detail-value" id="confidenceValue">-</div>
          <div class="result-detail-label">Akurasi</div>
        </div>
        <div class="result-detail-item">
          <div class="result-detail-value" id="timeValue">-</div>
          <div class="result-detail-label">Waktu</div>
        </div>
      </div>
      <button class="btn-done" onclick="resetAll()">Selesai</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  
  <script>
    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
    const video = document.getElementById('video');
    const header = document.getElementById('header');
    const cameraFrame = document.getElementById('cameraFrame');
    const pulseRing = document.getElementById('pulseRing');
    const faceGuide = document.getElementById('faceGuide');
    const statusText = document.getElementById('statusText');
    const startBtn = document.getElementById('startBtn');
    const startBtnText = document.getElementById('startBtnText');
    const captureBtn = document.getElementById('captureBtn');
    const resultOverlay = document.getElementById('resultOverlay');
    
    let stream = null;
    let isVerifying = false;
    let isFaceValid = false;
    let startTime = 0;
    let detectionTimer = null;
    let blinkCount = 0;
    let isEyeClosed = false;
    let lastBlinkTime = 0;
    let blinkStartTime = 0;
    
    let earSamples = [];
    let earBaseline = null;
    let calibrationDone = false;
    let consecutiveClosedFrames = 0;
    const CALIBRATION_FRAMES = 10;
    
    // HYSTERESIS THRESHOLDS - professional signal processing
    let earHistory = [];           // Moving average buffer
    const EAR_SMOOTH_SIZE = 3;     // Smooth 3 frame
    let dynamicBaseline = null;    // Continuously adapting baseline
    const CLOSE_RATIO = 0.80;      // Mata dianggap tutup jika EAR < 80% baseline
    const OPEN_RATIO = 0.92;       // Mata dianggap buka jika EAR > 92% baseline
    
    function calculateEAR(eye) {
      const A = Math.sqrt(Math.pow(eye[1].x - eye[5].x, 2) + Math.pow(eye[1].y - eye[5].y, 2));
      const B = Math.sqrt(Math.pow(eye[2].x - eye[4].x, 2) + Math.pow(eye[2].y - eye[4].y, 2));
      const C = Math.sqrt(Math.pow(eye[0].x - eye[3].x, 2) + Math.pow(eye[0].y - eye[3].y, 2));
      return (A + B) / (2 * C);
    }
    
    function showStatus(text, type = '') {
      statusText.className = 'status-text show ' + type;
      statusText.textContent = text;
    }
    
    function hideStatus() {
      statusText.className = 'status-text';
    }
    
    async function loadModels() {
      try {
        startBtnText.textContent = 'Memuat...';
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
        ]);
        startBtnText.textContent = 'Mulai Verifikasi';
        startBtn.disabled = false;
      } catch (err) {
        startBtnText.textContent = 'Gagal Memuat';
      }
    }
    
    async function startCamera() {
      try {
        startBtn.style.display = 'none';
        header.classList.add('hidden');
        showStatus('Mengaktifkan kamera...');
        
        stream = await navigator.mediaDevices.getUserMedia({
          video: { 
            facingMode: 'user', 
            width: { ideal: 640 }, 
            height: { ideal: 640 } 
          },
          audio: false
        });
        video.srcObject = stream;
        
        await new Promise(resolve => video.onloadedmetadata = resolve);
        
        cameraFrame.classList.add('show');
        pulseRing.className = 'pulse-ring scanning';
        
        isVerifying = true;
        startTime = performance.now();
        blinkCount = 0;
        calibrationDone = false;
        earSamples = [];
        earBaseline = null;
        consecutiveClosedFrames = 0;
        earHistory = [];
        dynamicBaseline = null;
        earHistory = [];
        dynamicBaseline = null;
        
        showStatus('Posisikan wajah di lingkaran');
        detectionLoop();
      } catch (err) {
        showStatus('Gagal mengakses kamera', 'error');
        startBtn.style.display = 'block';
        header.classList.remove('hidden');
      }
    }
    
    async function detectionLoop() {
      if (!isVerifying) return;
      
      try {
        // GANTI 512 KE 416 UNTUK IPHONE 8 (LEBIH CEPAT)
        const detection = await faceapi
          .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ 
            inputSize: 608, 
            scoreThreshold: 0.4 
          }))
          .withFaceLandmarks();
        
        if (!detection) {
          isFaceValid = false;
          captureBtn.disabled = true;
          faceGuide.classList.remove('hidden');
          pulseRing.className = 'pulse-ring scanning';
          if (calibrationDone) showStatus('Wajah tidak terdeteksi');
          if (isVerifying) detectionTimer = setTimeout(detectionLoop, 100);
          return;
        }
        
        // VALIDASI WAJAH YANG LEBIH LONGGAR (FORGIVING)
        const box = detection.detection.box;
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        
        // Margin tengah 30% (sebelumnya 20%)
        const isCentered = 
          Math.abs((box.x + box.width/2) - vw/2) < vw * 0.3 &&
          Math.abs((box.y + box.height/2) - vh/2) < vh * 0.3;
        // Ukuran minimal 25% (sebelumnya 30%)
        const isBigEnough = box.width > vw * 0.25;
        // Boleh terpotong sedikit (margin 0)
        const notCropped = box.x > 0 && box.y > 0 && box.x + box.width < vw && box.y + box.height < vh;
        
        if (!isCentered || !isBigEnough || !notCropped) {
          isFaceValid = false;
          captureBtn.disabled = true;
          faceGuide.classList.remove('hidden');
          pulseRing.className = 'pulse-ring scanning';
          consecutiveClosedFrames = 0;
        earHistory = [];
        dynamicBaseline = null;
          
          if (calibrationDone) {
            if (!isBigEnough) showStatus('Mendekatlah sedikit ke kamera');
            else if (!isCentered) showStatus('Posisikan wajah di tengah');
            else if (!notCropped) showStatus('Wajah terpotong, mundur sedikit');
          }
          if (isVerifying) detectionTimer = setTimeout(detectionLoop, 80);
          return;
        }
        
        // Face valid
        isFaceValid = true;
        captureBtn.disabled = false;
        captureBtn.style.display = 'block';
        faceGuide.classList.add('hidden');
        pulseRing.className = 'pulse-ring scanning';
        
        const landmarks = detection.landmarks;
        const leftEye = landmarks.getLeftEye();
        const rightEye = landmarks.getRightEye();
        const leftEAR = calculateEAR(leftEye);
        const rightEAR = calculateEAR(rightEye);
        const avgEAR = (leftEAR + rightEAR) / 2;
        
        if (!calibrationDone) {
          earSamples.push(avgEAR);
          if (earSamples.length >= CALIBRATION_FRAMES) {
            const sorted = [...earSamples].sort((a, b) => a - b);
            const trimmed = sorted.slice(2, -2);
            earBaseline = trimmed.reduce((a, b) => a + b, 0) / trimmed.length;
            calibrationDone = true;
            showStatus('Kedipkan mata Anda', 'blink-hint');
          } else {
            showStatus('Menyiapkan...');
            if (isVerifying) detectionTimer = setTimeout(detectionLoop, 50);
            return;
          }
        }
        
        // === PROFESSIONAL BLINK DETECTION ===
        const now = performance.now();
        
        // 1. SMOOTH EAR (moving average 3 frame - reduksi noise)
        earHistory.push(avgEAR);
        if (earHistory.length > EAR_SMOOTH_SIZE) earHistory.shift();
        const smoothEAR = earHistory.reduce((a, b) => a + b, 0) / earHistory.length;
        
        // 2. CONTINUOUS BASELINE ADAPTATION
        // Saat mata terbuka, baseline slowly adapts (handle lighting changes)
        if (!isEyeClosed && calibrationDone) {
          if (dynamicBaseline === null) dynamicBaseline = earBaseline;
          // Weighted average: 95% old baseline + 5% new value (slow adaptation)
          dynamicBaseline = (dynamicBaseline * 0.95) + (smoothEAR * 0.05);
        }
        
        // 3. HYSTERESIS THRESHOLDS (eliminasi flickering)
        const CLOSE_THRESHOLD = dynamicBaseline * CLOSE_RATIO;
        const OPEN_THRESHOLD = dynamicBaseline * OPEN_RATIO;
        
        if (!isEyeClosed) {
          // Cek mata TERTUTUP (harus turun di bawah CLOSE_THRESHOLD)
          if (smoothEAR < CLOSE_THRESHOLD) {
            isEyeClosed = true;
            blinkStartTime = now;
            pulseRing.className = 'pulse-ring blink-detected';
          }
        } else {
          // Cek mata TERBUKA kembali (harus naik di atas OPEN_THRESHOLD)
          if (smoothEAR > OPEN_THRESHOLD) {
            const blinkDuration = now - blinkStartTime;
            isEyeClosed = false;
            pulseRing.className = 'pulse-ring scanning';
            
            // Valid blink: 30ms - 2000ms, anti-double 150ms
            if (blinkDuration >= 30 && blinkDuration <= 2000 && (now - lastBlinkTime) > 150) {
              blinkCount++;
              lastBlinkTime = now;
              
              await verificationSuccess(detection, 'Blink');
              return;
            }
          }
        }
        
        if (isVerifying) detectionTimer = setTimeout(detectionLoop, 30);
      } catch (err) {
        if (isVerifying) detectionTimer = setTimeout(detectionLoop, 100);
      }
    }
    
    captureBtn.addEventListener('click', async () => {
      if (!isVerifying || !isFaceValid) return;
      
      captureBtn.disabled = true;
      captureBtn.textContent = 'Memproses...';
      
      try {
        const detection = await faceapi
          .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.4 }))
          .withFaceLandmarks();
        
        if (detection) {
          await verificationSuccess(detection, 'Manual');
        } else {
          captureBtn.disabled = false;
          captureBtn.textContent = 'Ambil Foto';
        }
      } catch (err) {
        captureBtn.disabled = false;
        captureBtn.textContent = 'Ambil Foto';
      }
    });
    
    async function verificationSuccess(detection, method) {
      isVerifying = false;
      clearTimeout(detectionTimer);
      
      const totalTime = ((performance.now() - startTime) / 1000).toFixed(1);
      const confidence = (detection.detection.score * 100).toFixed(0);
      
      pulseRing.className = 'pulse-ring success';
      captureBtn.style.display = 'none';
      hideStatus();
      
      setTimeout(() => {
        document.getElementById('confidenceValue').textContent = confidence + '%';
        document.getElementById('timeValue').textContent = totalTime + 's';
        document.getElementById('resultSubtitle').textContent = 
          method === 'Blink' ? 'Kedipan mata terdeteksi' : 'Foto terverifikasi';
        resultOverlay.classList.add('show');
      }, 800);
      
      if (stream) {
        setTimeout(() => stream.getTracks().forEach(t => t.stop()), 1000);
      }
    }
    
    function resetAll() {
      resultOverlay.classList.remove('show');
      cameraFrame.classList.remove('show');
      pulseRing.className = 'pulse-ring';
      hideStatus();
      captureBtn.style.display = 'none';
      captureBtn.textContent = 'Ambil Foto';
      startBtn.style.display = 'block';
      header.classList.remove('hidden');
      isVerifying = false;
      isFaceValid = false;
      calibrationDone = false;
      blinkCount = 0;
      consecutiveClosedFrames = 0;
    }
    
    startBtn.addEventListener('click', startCamera);
    loadModels();
  </script>
</body>
</html>
